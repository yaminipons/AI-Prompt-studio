# ==========================================================
# AI Prompt Engineering Studio - Main Application Config
# ==========================================================

spring:
  application:
    name: ai-prompt-engineering-studio

  profiles:
    active: dev

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:default_dev_secret_change_this_in_production_min_256_bits_long}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
    issuer: ai-prompt-engineering-studio

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5500,http://localhost:5500,http://localhost:3000}

  groq:
    api-key: ${GROQ_API_KEY:YOUR_GROK_API_KEY}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:openai/gpt-oss-20b}
    timeout-seconds: 60

  chromadb:
    enabled: ${CHROMADB_ENABLED:false}
    base-url: ${CHROMADB_URL:http://localhost:8000}
    collection-name: ${CHROMADB_COLLECTION:prompt_embeddings}
    timeout-seconds: 30

  admin:
    default-email: ${ADMIN_EMAIL:admin@promptstudio.com}
    default-password: ${ADMIN_PASSWORD:Admin@12345}
    default-name: ${ADMIN_NAME:Studio Admin}

logging:
  level:
    root: INFO
    com.promptstudio: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
